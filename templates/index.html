<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Avia TTS Dashboard</title>

    <style>
        :root {
            --bg: #1e1e1e;
            --card: #2d2d2d;
            --accent: #4CAF50;
            --text: #ffffff;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .container {
            width: 700px;
            background: var(--card);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #444;
        }

        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            flex: 1;
            padding: 15px;
            border: 1px solid #444;
            border-radius: 8px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        select, textarea, input {
            width: 100%;
            background: #1e1e1e;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            border-radius: 4px;
        }

        textarea {
            height: 120px;
            resize: none;
            margin-top: 10px;
            font-size: 1.1rem;
        }

        .slider-group {
            margin-bottom: 15px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        button:hover {
            background: #45a049;
        }

        audio {
            width: 100%;
            margin-top: 20px;
        }

        .status {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #ccc;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="row">
        <!-- Voice -->
        <div class="panel">
            <label>Voice</label>
            <select id="voice">
                <option value="en-US-Chirp-HD-F">Female (Chirp HD)</option>
                <option value="en-US-Chirp-HD-D">Male (Chirp HD)</option>
                <option value="en-US-Neural2-A">Neural Female</option>
            </select>
        </div>

        <!-- Speed -->
        <div class="panel">
            <label>Speed</label>
            <div class="slider-group">
                <div class="slider-header">
                    <span>Speed</span>
                    <span id="speedVal">1.0x</span>
                </div>
                <input type="range" id="speed" min="0.25" max="4.0" step="0.1" value="1.0">
            </div>
        </div>
    </div>

    <!-- Text -->
    <div class="panel">
        <label>Text</label>
        <textarea id="text">Hello! This is your AI voice assistant.</textarea>
    </div>

    <!-- Button -->
    <button id="btn">▶ Generate Speech</button>

    <div class="status" id="status"></div>

    <!-- Audio -->
    <audio id="player" controls></audio>

</div>

<script>
    const speed = document.getElementById("speed");
    const speedVal = document.getElementById("speedVal");

    speed.oninput = () => {
        speedVal.innerText = speed.value + "x";
    };

    const API_URL = "/synthesize";  
    // 🔴 CHANGE THIS when deploying:
    // const API_URL = "https://your-app.onrender.com/synthesize";

    document.getElementById("btn").onclick = async () => {
        const btn = document.getElementById("btn");
        const status = document.getElementById("status");

        btn.innerText = "Generating...";
        status.innerText = "Processing...";

        try {
            const payload = {
                text: document.getElementById("text").value,
                voice: document.getElementById("voice").value,
                speed: document.getElementById("speed").value
            };

            const response = await fetch(API_URL, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const err = await response.text();
                throw new Error(err);
            }

            const blob = await response.blob();
            const url = URL.createObjectURL(blob);

            const player = document.getElementById("player");
            player.src = url;
            player.play();

            status.innerText = "Done ✅";
        } catch (error) {
            console.error(error);
            status.innerText = "Error: " + error.message;
        }

        btn.innerText = "▶ Generate Speech";
    };
</script>

</body>
</html>
