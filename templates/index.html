<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Avia TTS</title>

    <style>
        body {
            background: #1e1e1e;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .box {
            width: 600px;
            background: #2d2d2d;
            padding: 20px;
            border-radius: 10px;
        }

        textarea, select, input {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            background: #111;
            color: white;
            border: 1px solid #444;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: #4CAF50;
            border: none;
            color: white;
            cursor: pointer;
        }

        audio {
            width: 100%;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>🎤 Avia TTS</h2>

    <label>Voice</label>
    <select id="voice">
        <option value="en-US-Chirp-HD-F">Female</option>
        <option value="en-US-Chirp-HD-D">Male</option>
    </select>

    <label>Speed</label>
    <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">

    <label>Text</label>
    <textarea id="text">Hello, this is my TTS system.</textarea>

    <button onclick="generate()">Generate</button>

    <audio id="player" controls></audio>

    <p id="status"></p>

</div>

<script>
const API_URL = "https://your-app.onrender.com/synthesize";
const API_KEY = "avia123";  // SAME as Render

async function generate() {
    const status = document.getElementById("status");
    status.innerText = "Processing...";

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "x-api-key": API_KEY
            },
            body: JSON.stringify({
                text: document.getElementById("text").value,
                voice: document.getElementById("voice").value,
                speed: document.getElementById("speed").value
            })
        });

        if (!response.ok) {
            throw new Error(await response.text());
        }

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);

        const player = document.getElementById("player");
        player.src = url;
        player.play();

        status.innerText = "Done ✅";

    } catch (err) {
        status.innerText = "Error: " + err.message;
    }
}
</script>

</body>
</html>
